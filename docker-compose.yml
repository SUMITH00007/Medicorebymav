version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: medicore-db
    restart: always
    environment:
      POSTGRES_USER: medicore_admin
      POSTGRES_PASSWORD: medicore_secure_password
      POSTGRES_DB: medicore_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: medicore-api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://medicore_admin:medicore_secure_password@db:5432/medicore_prod
      - SECRET_KEY=PRODUCTION_READY_SECRET_KEY_FOR_JWT_PLAINTEXT_VALIDATIONS
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: medicore-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
